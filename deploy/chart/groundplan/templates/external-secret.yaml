{{/*
External Secrets Operator (ESO) sources. Emitted only for the secrets whose
externalSecret.remoteRef.key is set while externalSecrets.enabled — each writes
into the very Secret name/key the Deployments and migration Job already consume
(target.name = the chart Secret name), so nothing downstream changes. The ESO
controller + CRDs are the cluster's; the chart only declares the desired reads.
*/}}
{{- if .Values.externalSecrets.enabled -}}
{{- $store := .Values.externalSecrets.secretStore -}}
{{- $api := .Values.externalSecrets.apiVersion -}}
{{- $refresh := .Values.externalSecrets.refreshInterval -}}
{{- if include "groundplan.apiExternalSecretActive" . }}
apiVersion: {{ $api }}
kind: ExternalSecret
metadata:
  name: {{ include "groundplan.fullname" . }}-api
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: {{ include "groundplan.apiSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.api.externalSecret.remoteRef.key | quote }}
        {{- with .Values.api.externalSecret.remoteRef.property }}
        property: {{ . | quote }}
        {{- end }}
{{- end }}
{{- if and (not .Values.postgresql.enabled) (include "groundplan.dbExternalSecretActive" .) }}
---
apiVersion: {{ $api }}
kind: ExternalSecret
metadata:
  name: {{ include "groundplan.fullname" . }}-db
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: {{ include "groundplan.dbSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: {{ include "groundplan.dbPasswordKey" . }}
      remoteRef:
        key: {{ .Values.externalDatabase.externalSecret.remoteRef.key | quote }}
        {{- with .Values.externalDatabase.externalSecret.remoteRef.property }}
        property: {{ . | quote }}
        {{- end }}
{{- end }}
{{- if include "groundplan.aiExternalSecretActive" . }}
---
apiVersion: {{ $api }}
kind: ExternalSecret
metadata:
  name: {{ include "groundplan.fullname" . }}-ai
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: {{ include "groundplan.aiSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: AI_API_KEY
      remoteRef:
        key: {{ .Values.ai.externalSecret.remoteRef.key | quote }}
        {{- with .Values.ai.externalSecret.remoteRef.property }}
        property: {{ . | quote }}
        {{- end }}
{{- end }}
{{- end }}
