{{- if and .Values.keycloak.enabled .Values.keycloak.host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "groundplan.fullname" . }}-keycloak
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.keycloak.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.keycloak.host }}
      {{- with .Values.keycloak.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.keycloak.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "groundplan.fullname" . }}-keycloak
                port:
                  name: http
{{- end }}
