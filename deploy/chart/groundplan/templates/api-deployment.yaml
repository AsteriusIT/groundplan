{{- include "groundplan.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "groundplan.fullname" . }}-api
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "groundplan.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "groundplan.selectorLabels" (dict "root" . "component" "api") | nindent 8 }}
      annotations:
        # Roll the pods when the chart-managed secret material changes.
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: {{ include "groundplan.image" (dict "root" . "name" "groundplan-backend") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            {{- include "groundplan.databaseEnv" . | nindent 12 }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "groundplan.apiSecretName" . }}
                  key: ENCRYPTION_KEY
            - name: OIDC_ISSUER_URL
              value: {{ include "groundplan.issuerUrl" . | quote }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            - name: CORS_ORIGIN
              value: {{ include "groundplan.publicUrl" . | quote }}
            - name: PUBLIC_BASE_URL
              value: {{ include "groundplan.publicUrl" . | quote }}
            - name: SINGLE_ORG
              value: {{ .Values.api.singleOrg | quote }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Probe pair (GP-168): liveness ignores the DB, readiness checks it.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
