{{/*
Chart-managed secrets — rendered only for the inline-value alternatives.
Production brings its own Secrets and references them by name (existingSecret),
in which case nothing is emitted here.
*/}}
{{- if and (not .Values.api.existingSecret) .Values.api.encryptionKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "groundplan.fullname" . }}-api
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  ENCRYPTION_KEY: {{ .Values.api.encryptionKey | quote }}
{{- end }}
{{- if and (not .Values.externalDatabase.existingSecret) .Values.externalDatabase.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "groundplan.fullname" . }}-db
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  {{ .Values.externalDatabase.passwordKey }}: {{ .Values.externalDatabase.password | quote }}
{{- end }}
