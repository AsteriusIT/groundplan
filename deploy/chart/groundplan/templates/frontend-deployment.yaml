apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "groundplan.fullname" . }}-frontend
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "groundplan.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "groundplan.selectorLabels" (dict "root" . "component" "frontend") | nindent 8 }}
      annotations:
        # Roll the pods when the runtime config.json changes.
        checksum/config: {{ include (print $.Template.BasePath "/frontend-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          # nginx-unprivileged serving the static SPA on 8080 (GP-168).
          image: {{ include "groundplan.image" (dict "root" . "name" "groundplan-frontend") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          # The SPA reads its runtime config (API base + OIDC) from
          # /config.json — the chart mounts it over the image default, so the
          # image stays environment-agnostic.
          volumeMounts:
            - name: runtime-config
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: runtime-config
          configMap:
            name: {{ include "groundplan.fullname" . }}-frontend-config
