apiVersion: v1
kind: Service
metadata:
  name: {{ include "groundplan.fullname" . }}-api
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "groundplan.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: http
