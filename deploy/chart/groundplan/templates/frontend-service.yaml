apiVersion: v1
kind: Service
metadata:
  name: {{ include "groundplan.fullname" . }}-frontend
  labels:
    {{- include "groundplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "groundplan.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
