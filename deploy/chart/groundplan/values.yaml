# Groundplan Helm chart — documented values (GP-169..GP-171).
#
# The two production prerequisites are brought by you, referenced by name:
#   * a Postgres database        -> externalDatabase.*
#   * an OIDC identity provider  -> oidc.*
# For evaluation on a laptop/kind cluster the chart can run both itself —
# see postgresql.enabled and keycloak.enabled (both are eval-only, not HA,
# and mutually exclusive with their external counterpart).
#
# Secrets are referenced by name (existingSecret) wherever possible so you can
# bring sealed-secrets / external-secrets. The inline value alternatives exist
# for evaluation and CI; they end up in a chart-managed Secret.

image:
  # Registry/namespace holding groundplan-backend, groundplan-frontend and
  # groundplan-keycloak (published by the build-images workflow on release tags).
  registry: ghcr.io/asteriusit
  # Image tag; empty = the chart's appVersion. Pin a release (e.g. "1.4.0") in
  # production — "latest" moves.
  tag: ""
  pullPolicy: IfNotPresent
  # Names of imagePullSecrets in the release namespace, for private registries.
  pullSecrets: []

api:
  replicas: 1
  # ENCRYPTION_KEY protects repository PATs / kubeconfigs at rest. Provide ONE:
  #   existingSecret: name of a Secret with an ENCRYPTION_KEY entry, or
  #   encryptionKey:  the key inline (eval/CI) — generate: openssl rand -base64 32
  existingSecret: ""
  encryptionKey: ""
  # Single-org (self-hosted, default) vs SaaS multi-tenant — see docs.
  singleOrg: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  # Extra environment for the API container (k8s EnvVar objects, verbatim).
  # This is the home of every optional knob — e.g. the AI layer:
  #   - name: AI_API_KEY
  #     valueFrom: { secretKeyRef: { name: groundplan-ai, key: AI_API_KEY } }
  extraEnv: []

frontend:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

ingress:
  enabled: true
  # IngressClass name; empty = the cluster default.
  className: ""
  # Public host the app is served on, e.g. groundplan.example.com. Routes:
  # /api -> the API, everything else -> the SPA.
  host: ""
  annotations: {}
  tls:
    # true = serve https; secretName may stay empty when a controller-level
    # default certificate (or cert-manager annotation) provides it.
    enabled: false
    secretName: ""

# Public origin (scheme://host) the deployment is reachable on. Empty = derived
# from ingress.host (+ ingress.tls.enabled). Used for CORS and the absolute
# URLs the API writes into PR comments.
publicUrl: ""

# --- Database (GP-170) ------------------------------------------------------
# Production: point at your own Postgres. The password is read from
# existingSecret (key passwordKey) or, for eval/CI, from the inline password.
# NOTE: username/password become part of a connection URL — URL-encode any
# special characters.
externalDatabase:
  host: ""
  port: 5432
  database: groundplan
  username: groundplan
  existingSecret: ""
  passwordKey: password
  password: ""
  # Appended as ?sslmode=... when set (e.g. "require").
  sslMode: ""

# EVALUATION ONLY: a single-replica in-cluster Postgres (no HA, no backups, no
# tuning) so the chart runs self-contained on kind/minikube. Mutually exclusive
# with externalDatabase.host — enabling both fails template rendering. Do not
# run production on this.
postgresql:
  enabled: false
  image: postgres:17-alpine
  # Password of the "groundplan" user owning the "groundplan" database. An
  # eval default on purpose; the Service is cluster-internal only.
  password: groundplan
  storage: 2Gi
  # Empty = the cluster's default StorageClass.
  storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Migrations run as a Helm hook Job (GP-170) using the same image + DATABASE_URL
# as the API: always pre-upgrade (schema lands before new pods roll), and
# pre-install too when both the database and its credentials pre-exist the
# release (external DB + existingSecret) — otherwise post-install, because a
# hook cannot wait on resources the install itself is about to create.
migrations:
  backoffLimit: 10

# --- Identity provider (GP-171) --------------------------------------------
# Production: point at your own OIDC issuer (Keycloak, Azure AD, ...). The
# issuer must mint access tokens whose `aud` matches oidc.audience; the SPA
# authenticates with the public client oidc.clientId (Authorization Code+PKCE).
oidc:
  issuerUrl: ""
  audience: groundplan-api
  clientId: groundplan-frontend

# EVALUATION ONLY: an in-cluster Keycloak preconfigured with the "groundplan"
# realm + clients via realm import, auto-wired into oidc.* (setting both
# keycloak.enabled and oidc.issuerUrl fails template rendering). It runs
# start-dev on its embedded file database — nothing outlives the pod except
# what the realm import recreates. Do not run production on this.
keycloak:
  enabled: false
  # Empty = <image.registry>/groundplan-keycloak:<tag> — the groundplan-themed
  # Keycloak published beside the app images. Any stock
  # quay.io/keycloak/keycloak image works too (set theme: "" with it).
  image: ""
  # Public host for the browser login, served by its own ingress rule (same
  # class/annotations as the app ingress). Empty = in-cluster only — token
  # grants work (CI), browser login does not.
  host: ""
  tls:
    enabled: false
    secretName: ""
  # Login/account/email theme the imported realm uses; "" = Keycloak default.
  theme: groundplan
  # Bootstrap admin credentials (admin console) — eval defaults, eval scope.
  adminPassword: admin
  # The imported ready-to-use login. Disable once you created real users.
  devUser:
    enabled: true
    username: dev
    password: dev
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1536Mi
