# Production shape sourcing every secret from External Secrets Operator (ESO):
# ENCRYPTION_KEY, the database password and the AI key all materialise from a
# ClusterSecretStore — no secret material lives in the release.
image:
  tag: 1.0.0

externalSecrets:
  enabled: true
  secretStore:
    name: cluster-store
    kind: ClusterSecretStore
  refreshInterval: 30m

api:
  externalSecret:
    remoteRef:
      key: groundplan/encryption-key

ingress:
  host: groundplan.example.com
  className: nginx
  tls:
    enabled: true
    secretName: groundplan-tls

externalDatabase:
  host: db.internal.example.com
  database: groundplan
  username: groundplan
  externalSecret:
    remoteRef:
      key: groundplan/database
      property: password
  sslMode: require

ai:
  externalSecret:
    remoteRef:
      key: groundplan/ai-api-key

oidc:
  issuerUrl: https://login.example.com/realms/groundplan
