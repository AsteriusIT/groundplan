# expect: externalSecrets.enabled requires externalSecrets.secretStore.name
# ESO turned on but no store to read from.
externalSecrets:
  enabled: true

api:
  externalSecret:
    remoteRef:
      key: groundplan/encryption-key

ingress:
  host: groundplan.example.com

externalDatabase:
  host: db.internal.example.com
  externalSecret:
    remoteRef:
      key: groundplan/database

oidc:
  issuerUrl: https://login.example.com/realms/groundplan
