apiVersion: v1
kind: ConfigMap
metadata:
  name: groundplan-frontend-config
  labels:
    helm.sh/chart: groundplan-0.1.0
    app.kubernetes.io/name: groundplan
    app.kubernetes.io/instance: groundplan
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: frontend
data:
  # Runtime config the SPA fetches at startup. apiUrl stays empty: the app
  # calls /api on its own origin and the ingress routes it to the API.
  config.json: |
    {
      "apiUrl": "",
      "oidcIssuer": "https://login.example.com/realms/groundplan",
      "oidcClientId": "groundplan-frontend"
    }

