# Source: groundplan/templates/migrate-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: groundplan-migrate
  labels:
    helm.sh/chart: groundplan-0.1.0
    app.kubernetes.io/name: groundplan
    app.kubernetes.io/instance: groundplan
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  # Retries cover the embedded Postgres still coming up on first install.
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: groundplan
        app.kubernetes.io/instance: groundplan
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        # The image's `node` user — numeric so kubelet can verify non-root.
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/asteriusit/groundplan-backend:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["node", "dist/db/migrate.cli.js"]
          env:
            - name: NODE_ENV
              value: production
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-db-credentials
                  key: password
            - name: DATABASE_URL
              value: "postgres://groundplan:$(DB_PASSWORD)@db.internal.example.com:5432/groundplan?sslmode=require"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi

