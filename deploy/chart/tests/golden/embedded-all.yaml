# Source: groundplan/templates/frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: groundplan-frontend
  labels:
    helm.sh/chart: groundplan-0.1.0
    app.kubernetes.io/name: groundplan
    app.kubernetes.io/instance: groundplan
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: groundplan
      app.kubernetes.io/instance: groundplan
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: groundplan
        app.kubernetes.io/instance: groundplan
        app.kubernetes.io/component: frontend
      annotations:
        # Roll the pods when the runtime config.json changes.
        checksum/config: eb248e10091ea82bac83ba7ed36bb1d0407f52d810eea992e5448b3496701363
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          # nginx-unprivileged serving the static SPA on 8080 (GP-168).
          image: ghcr.io/asteriusit/groundplan-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          # The SPA reads its runtime config (API base + OIDC) from
          # /config.json — the chart mounts it over the image default, so the
          # image stays environment-agnostic.
          volumeMounts:
            - name: runtime-config
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 32Mi
      volumes:
        - name: runtime-config
          configMap:
            name: groundplan-frontend-config

