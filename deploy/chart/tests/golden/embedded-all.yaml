# Source: groundplan/templates/postgresql.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: groundplan-postgresql
  labels:
    helm.sh/chart: groundplan-0.1.0
    app.kubernetes.io/name: groundplan
    app.kubernetes.io/instance: groundplan
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: postgresql
spec:
  serviceName: groundplan-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: groundplan
      app.kubernetes.io/instance: groundplan
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: groundplan
        app.kubernetes.io/instance: groundplan
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: groundplan
            - name: POSTGRES_DB
              value: groundplan
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: groundplan-db
                  key: password
            # Subdirectory: the volume root holds lost+found on some
            # provisioners, which initdb refuses.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "groundplan", "-d", "groundplan"]
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "groundplan", "-d", "groundplan"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

