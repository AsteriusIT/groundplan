# Source: groundplan/templates/api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: groundplan-api
  labels:
    helm.sh/chart: groundplan-0.1.0
    app.kubernetes.io/name: groundplan
    app.kubernetes.io/instance: groundplan
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: groundplan
      app.kubernetes.io/instance: groundplan
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: groundplan
        app.kubernetes.io/instance: groundplan
        app.kubernetes.io/component: api
      annotations:
        # Roll the pods when the chart-managed secret material changes.
        checksum/secrets: 1a843016f307a8eb2b6591c08f13179c307adff106b57ee860df13e4607023a9
    spec:
      securityContext:
        runAsNonRoot: true
        # The image's `node` user — numeric so kubelet can verify non-root.
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/asteriusit/groundplan-backend:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: groundplan-db
                  key: password
            - name: DATABASE_URL
              value: "postgres://groundplan:$(DB_PASSWORD)@groundplan-postgresql:5432/groundplan"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: groundplan-api
                  key: ENCRYPTION_KEY
            - name: OIDC_ISSUER_URL
              value: "http://auth.local.test/realms/groundplan"
            - name: OIDC_AUDIENCE
              value: "groundplan-api"
            - name: CORS_ORIGIN
              value: "http://groundplan.local.test"
            - name: PUBLIC_BASE_URL
              value: "http://groundplan.local.test"
            - name: SINGLE_ORG
              value: "true"
          # Probe pair (GP-168): liveness ignores the DB, readiness checks it.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi

