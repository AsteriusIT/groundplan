# Source: groundplan/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: groundplan
  labels:
    helm.sh/chart: groundplan-0.1.0
    app.kubernetes.io/name: groundplan
    app.kubernetes.io/instance: groundplan
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
spec:
  rules:
    - host: groundplan.local.test
      http:
        paths:
          # API first (longest prefix); everything else is the SPA, whose
          # nginx falls back to index.html for client-side routes.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: groundplan-api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: groundplan-frontend
                port:
                  name: http

