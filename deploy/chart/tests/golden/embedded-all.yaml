# Source: groundplan/templates/keycloak.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: groundplan-keycloak
  labels:
    helm.sh/chart: groundplan-0.1.0
    app.kubernetes.io/name: groundplan
    app.kubernetes.io/instance: groundplan
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: groundplan
      app.kubernetes.io/instance: groundplan
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: groundplan
        app.kubernetes.io/instance: groundplan
        app.kubernetes.io/component: keycloak
      annotations:
        # Re-import the realm when its definition changes.
        checksum/realm: 8f64e10beda0fda34e64ca74d10ca644cdbbf24a2c48722c5759435fe4214692
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keycloak
          image: ghcr.io/asteriusit/groundplan-keycloak:1.0.0
          imagePullPolicy: IfNotPresent
          args: ["start-dev", "--import-realm"]
          env:
            # Fixed public URL: every token carries this issuer whatever host
            # the request arrived on, so the api's iss check always matches.
            - name: KC_HOSTNAME
              value: "http://auth.local.test"
            - name: KC_HTTP_ENABLED
              value: "true"
            # TLS (if any) ends at the ingress.
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "admin"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 90
            periodSeconds: 15
          resources:
            limits:
              memory: 1536Mi
            requests:
              cpu: 250m
              memory: 512Mi
      volumes:
        - name: realm-import
          configMap:
            name: groundplan-keycloak-realm

