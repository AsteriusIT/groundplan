# Local development dependencies. Brings up Postgres for the backend.
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:17-alpine
    container_name: groundplan-postgres
    environment:
      POSTGRES_USER: groundplan
      POSTGRES_PASSWORD: groundplan
      POSTGRES_DB: groundplan
    ports:
      - "5432:5432"
    volumes:
      - groundplan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groundplan -d groundplan"]
      interval: 5s
      timeout: 5s
      retries: 5

  # OIDC identity provider for local auth. Opt-in: only starts with the `auth`
  # profile, e.g. `docker compose --profile auth up -d`.
  #
  # Built from keycloak/Dockerfile: stock Keycloak with the carbon "groundplan"
  # theme (login/account/email) baked into its providers dir — the realm import
  # sets loginTheme/accountTheme/emailTheme = "groundplan". First run builds the
  # image (compiles the theme jar); rebuild after theme changes with
  # `docker compose --profile auth build keycloak` (or `up --build`).
  keycloak:
    build:
      context: .
      dockerfile: keycloak/Dockerfile
    image: groundplan-keycloak:local
    container_name: groundplan-keycloak
    profiles: ["auth"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8085:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro

volumes:
  groundplan_pgdata:
