# Serves the built Astro marketing site. TLS is handled by the Caddy edge
# (infra/caddy/Caddyfile); this server only serves static files. No SPA
# fallback: the site is real pages, so unknown paths are honest 404s.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json font/woff2;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Astro writes content-hashed assets to /_astro — cache them hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache HTML, so new deploys are picked up at once.
    location ~ \.html$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
