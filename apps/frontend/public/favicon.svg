<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <style>
    svg { isolation: isolate; }
    rect { mix-blend-mode: multiply; }
    .t { fill: #14b8a6; }
    .s { fill: #0ea5e9; }
    .v { fill: #8b5cf6; }
    @media (prefers-color-scheme: dark) {
      rect { mix-blend-mode: screen; }
      .t { fill: #2dd4bf; }
      .s { fill: #38bdf8; }
      .v { fill: #a78bfa; }
    }
  </style>
  <rect class="t" x="33" y="17" width="34" height="34" rx="9" transform="rotate(45 50 34)" />
  <rect class="s" x="19" y="45" width="34" height="34" rx="9" transform="rotate(45 36 62)" />
  <rect class="v" x="47" y="45" width="34" height="34" rx="9" transform="rotate(45 64 62)" />
</svg>
