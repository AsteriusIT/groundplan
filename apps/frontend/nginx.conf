# Serves the built Vite SPA. TLS + /api and /realms routing are handled by the
# Caddy edge (see infra/caddy/Caddyfile); this server only serves static files
# with a single-page-app fallback so client-side routes (/callback, /share/*,
# deep links) resolve to index.html.

server {
    # 8080: the image is nginx-unprivileged (non-root), which can't bind :80.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly (Caddy also compresses at the edge, but
    # this keeps the frontend fast if hit directly on the internal network).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json font/woff2;

    # Sensible defaults that don't interfere with the OIDC flow.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML entry point, so new deploys are picked up at once.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Runtime config is mounted/replaced per environment — never cache it, so a
    # new config.json is picked up on the next load (like index.html).
    location = /config.json {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths render the app shell (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
