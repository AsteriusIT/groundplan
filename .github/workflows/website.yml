# Build & push the marketing-website image on every merge to main (GP-158).
#
# Unlike the product images (build-images.yml, released on version tags), the
# website deploys continuously: a merge to main that touches apps/website/**
# publishes groundplan-website:latest, and the deploy host picks it up on its
# next pull (pull-based deploys, docs/deployment.md). The site stays behind a
# noindex robots policy until the trademark gate (GP-166) clears.
#
# Requires the same repository secret as build-images.yml:
#   SCW_SECRET_KEY  Scaleway API secret key with Container Registry write.
name: website

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: rg.fr-par.scw.cloud/eidos

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/groundplan-website
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # Build once and load it so Trivy scans the exact image before publish,
      # same gate as the product images.
      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/website/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=website
          cache-to: type=gha,mode=max,scope=website

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/website/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=website
