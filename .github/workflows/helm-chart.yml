# Guard the Helm chart (GP-169/GP-172): lint + golden-file rendering tests,
# then a full install smoke test on kind — install all-in-one eval mode, log
# in against the imported realm, POST a fixture plan.json to the webhook and
# assert the snapshot API returns it.
# `deploy/chart/tests/run.sh --update` refreshes goldens.
name: helm-chart

on:
  push:
    branches: [main]
    paths:
      - "deploy/chart/**"
      - ".github/workflows/helm-chart.yml"
      - "apps/backend/Dockerfile"
      - "apps/frontend/Dockerfile"
  pull_request:
    paths:
      - "deploy/chart/**"
      - ".github/workflows/helm-chart.yml"
      - "apps/backend/Dockerfile"
      - "apps/frontend/Dockerfile"
  workflow_dispatch:

concurrency:
  group: helm-chart-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-golden:
    runs-on: ubuntu-latest # helm is preinstalled on GitHub runners
    steps:
      - uses: actions/checkout@v4
      - name: helm lint
        run: helm lint deploy/chart/groundplan
      - name: Golden-file tests
        run: deploy/chart/tests/run.sh

  install-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-golden
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # Same cache scopes as build-images, so unchanged layers are hits.
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          load: true
          tags: localhost/groundplan-backend:smoke
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          load: true
          tags: localhost/groundplan-frontend:smoke
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Load images into kind
        run: |
          kind load docker-image localhost/groundplan-backend:smoke --name chart-testing
          kind load docker-image localhost/groundplan-frontend:smoke --name chart-testing

      - name: Install & smoke test
        run: deploy/chart/tests/smoke.sh

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n groundplan-smoke get pods -o wide || true
          kubectl -n groundplan-smoke describe pods || true
          kubectl -n groundplan-smoke logs -l app.kubernetes.io/component=api --tail=200 || true
          kubectl -n groundplan-smoke logs -l app.kubernetes.io/component=keycloak --tail=100 || true
          kubectl -n groundplan-smoke logs -l app.kubernetes.io/component=migrate --tail=100 || true
