# Package (and on a version tag, publish) the VS Code extension (GP-150).
#
# workflow_dispatch  -> build + test + package, upload the .vsix artifact.
# push tag vscode-v* -> the same, then publish to the VS Code Marketplace
#                       (secret VSCE_PAT) and Open VSX (secret OVSX_PAT).
#                       The version comes from apps/vscode/package.json and
#                       must match the tag, or the run fails before publishing.
#
# Setup for the secrets/publisher accounts: docs/vscode-publishing.md.
name: vscode-extension

on:
  push:
    tags: ["vscode-v*"]
  workflow_dispatch:

concurrency:
  group: vscode-extension-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (extension + workspace deps)
        run: pnpm install --frozen-lockfile --filter groundplan-vscode...

      - name: Test
        run: pnpm --filter groundplan-vscode test

      - name: Tag matches the manifest version
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        run: |
          MANIFEST=$(node -p "require('./apps/vscode/package.json').version")
          TAG="${GITHUB_REF_NAME#vscode-v}"
          if [ "$MANIFEST" != "$TAG" ]; then
            echo "tag vscode-v$TAG != manifest $MANIFEST" >&2
            exit 1
          fi

      - name: Package .vsix (bundles host + webview first)
        run: pnpm --filter groundplan-vscode package

      - name: Bundle discipline — the .vsix stays lean
        run: |
          SIZE=$(stat -c%s apps/vscode/groundplan.vsix)
          echo ".vsix size: $SIZE bytes"
          if [ "$SIZE" -gt 5242880 ]; then
            echo ".vsix exceeds 5 MB" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: groundplan-vsix
          path: apps/vscode/groundplan.vsix
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT not set — skipping Marketplace publish" >&2
            exit 1
          fi
          pnpm --filter groundplan-vscode exec vsce publish \
            --no-dependencies --packagePath groundplan.vsix

      - name: Publish to Open VSX (VSCodium / Cursor users)
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT not set — skipping Open VSX publish" >&2
            exit 1
          fi
          pnpm --filter groundplan-vscode exec ovsx publish \
            groundplan.vsix -p "$OVSX_PAT"
