# Build & push the production images to the Scaleway container registry.
#
# Automates the manual flow in docs/deployment.md ("Building & pushing images").
# Publishes on version tags (v1.2.3 -> 1.2.3, 1.2, latest); workflow_dispatch
# produces a sha-tagged build for testing without touching `latest`.
#
# Requires one repository secret:
#   SCW_SECRET_KEY  A Scaleway API secret key with Container Registry write.
#                   (Registry login user is the literal "nologin".)
name: build-images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# One run per ref; a newer push supersedes an in-flight build.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # pushing to Scaleway, not GHCR — no `packages` scope needed

env:
  REGISTRY: rg.fr-par.scw.cloud/eidos

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/groundplan-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,format=short

      # Build once and load it into the runner's Docker so Trivy can scan the
      # exact image before it is published. linux/amd64 only: the backend image
      # relies on the @resvg/resvg-js linux-x64-gnu prebuild + a frozen-lockfile
      # install, and the deploy target is amd64 (see docs/deployment.md).
      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      # Gate the release on fixable CRITICAL vulnerabilities. ignore-unfixed
      # keeps unpatchable base-image CVEs from wedging every release; the full
      # table (all severities) is printed to the logs regardless. Tighten to
      # `severity: HIGH,CRITICAL` or set `exit-code: '0'` for report-only.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      # Cache hit from the build above, so this only uploads layers.
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
